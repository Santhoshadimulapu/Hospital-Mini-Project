# ============================
# APPLICATION PROPERTIES
# ============================
spring.application.name=hospital-backend
server.port=${PORT:8080}

# ============================
# MySQL Configuration (Development)
# ============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hospital_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================
# JPA / Hibernate
# ============================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ============================
# JWT Configuration
# ============================
app.jwt.secret=${JWT_SECRET:dev-only-change-this-jwt-secret-key-to-at-least-32-characters}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ============================
# CORS
# ============================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ============================
# Seed Data (enabled for local/dev)
# ============================
app.seed.enabled=${APP_SEED_ENABLED:true}
app.seed.allow-in-prod=${APP_SEED_ALLOW_IN_PROD:false}
app.seed.admin-email=${APP_SEED_ADMIN_EMAIL:admin@hospital.local}
app.seed.admin-password=${APP_SEED_ADMIN_PASSWORD:change-me-admin-password}

# ============================
# Actuator
# ============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ============================
# Hugging Face Router Configuration
# ============================
hf.api.url=${HF_API_URL:https://router.huggingface.co/v1/chat/completions}
hf.api.key=${HF_API_KEY:}
hf.model=${HF_MODEL:meta-llama/Llama-3.1-8B-Instruct}
hf.timeout-seconds=${HF_TIMEOUT_SECONDS:15}

# ============================
# SMS / Twilio Configuration
# ============================
sms.enabled=${SMS_ENABLED:false}
sms.hospital-name=${SMS_HOSPITAL_NAME:City Hospital}
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}

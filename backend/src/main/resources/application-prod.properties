# ============================
# MySQL Configuration (Production)
# ============================
server.port=${PORT:8080}

spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?sslMode=REQUIRED&allowPublicKeyRetrieval=true&serverTimezone=UTC}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS}

# Seed data disabled in production
app.seed.enabled=${APP_SEED_ENABLED:false}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Hugging Face
hf.api.url=${HF_API_URL:https://router.huggingface.co/v1/chat/completions}
hf.api.key=${HF_API_KEY}
hf.model=${HF_MODEL:meta-llama/Llama-3.1-8B-Instruct}
hf.timeout-seconds=${HF_TIMEOUT_SECONDS:15}

# SMS / Twilio
sms.enabled=${SMS_ENABLED:false}
sms.hospital-name=${SMS_HOSPITAL_NAME:City Hospital}
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}
